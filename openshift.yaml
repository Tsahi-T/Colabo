# COLABO on OpenShift. Set the image and the colabo-db secret before applying:
#   oc create secret generic colabo-db --from-literal=DATABASE_URL='postgres://user:pass@host:5432/colabo'
#   oc apply -f openshift.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: colabo
spec:
  replicas: 1   # keep 1 — realtime sync state is in-process (add Redis before scaling out)
  selector:
    matchLabels: { app: colabo }
  template:
    metadata:
      labels: { app: colabo }
    spec:
      containers:
        - name: colabo
          image: image-registry.openshift-image-registry.svc:5000/YOUR_NAMESPACE/colabo:latest
          ports:
            - containerPort: 3001
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: { name: colabo-db, key: DATABASE_URL }
            - name: PGSSL
              value: "false"
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: "1", memory: 1Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: colabo
spec:
  selector: { app: colabo }
  ports:
    - port: 3001
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: colabo
  annotations:
    # Realtime sync holds long-lived WebSockets. Without this the router closes
    # idle connections after ~30s and readers get dropped mid-session.
    haproxy.router.openshift.io/timeout: 1h
spec:
  to: { kind: Service, name: colabo }
  port: { targetPort: 3001 }
  tls: { termination: edge }
